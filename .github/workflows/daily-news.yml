name: 📰 Daily News Digest

on:
  # ── Scheduled: Runs Daily at 7:00 AM IST (1:30 UTC) ──
  schedule:
    - cron: '30 1 * * *'      # 7:00 AM IST

  # ── Manual Trigger: Run immediately from GitHub UI ──
  workflow_dispatch:

jobs:
  send-daily-news:
    name: Fetch & Send News Digest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # Caches pip dependencies for faster runs

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📡 Fetch news & send to Telegram
        run: python news_fetcher.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 💾 Upload news digest as artifact
        uses: actions/upload-artifact@v6
        with:
          name: news-digest-${{ github.run_id }}
          path: news_digest_*.md
          retention-days: 3
          if-no-files-found: ignore
